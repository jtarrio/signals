<html>
  <head>
    <style>
      #container {
        height: calc(100vh - 1em);
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        padding: 1ex;
      }
      #modeParams {
        width: 100%;
        box-sizing: border-box;
      }
      #responseView {
        width: 100%;
        height: 0;
        flex: 1;
        padding: 1ex 0;
      }
    </style>
    <script src="demod_explorer.js" type="module"></script>
  </head>
  <body>
    <div id="container">
      <fieldset id="modeParams">
        <legend>Mode parameters</legend>
        Scheme:
        <select id="scheme"></select>
        <span class="ctr ctr-bandwidth"
          >Bandwidth: <input type="number" id="bandwidth" min="0"
        /></span>
      </fieldset>
      <canvas id="responseView"></canvas>
    </div>
  </body>
</html>
